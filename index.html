---
layout: default
---
 
<section class="content">
    <h2>Wanna Read!</h2>
    <p>This is my blog where I spout rubbish that some people may want to read.</p>
</section>

{% for post in site.posts %}

<article>
    <h3>{{ post.title }}</h3>
    <img width="140" height="auto" src="{{ post.image }}" />
    {{ post.content }}
    <div style="clear:both;"></div>
</article>

{% endfor %}
